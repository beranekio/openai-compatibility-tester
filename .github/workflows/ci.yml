name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Build binary
        run: go build -o /tmp/openai-compatibility-tester ./cmd/openai-compatibility-tester

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: openai-compatibility-tester:ci
          cache-from: type=gha

  reusable-workflow-smoke:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build mock server
        run: go build -o /tmp/mockserver ./cmd/mockserver

      - name: Start mock server
        run: |
          /tmp/mockserver > /tmp/mockurl.txt &
          echo $! > /tmp/mockpid.txt
          for i in $(seq 1 50); do
            [ -s /tmp/mockurl.txt ] && break
            sleep 0.2
          done
          url="$(cat /tmp/mockurl.txt)"
          echo "Mock base URL: $url"
          curl -fsS -H "Authorization: Bearer test" "$url/models" >/dev/null
          echo "MOCK_URL=$url" >> "$GITHUB_ENV"

      - name: Build tester image
        run: docker build -t oact:ci .

      - name: Run tester against mock
        env:
          OPENAI_BASE_URL: ${{ env.MOCK_URL }}
          OPENAI_API_KEY: test
          TEST_SUITES: default
          IMAGE: oact:ci
        run: |
          set -euo pipefail
          # The image entrypoint is the tester binary; its exit code propagates.
          docker run --rm --network host \
            -e OPENAI_BASE_URL -e OPENAI_API_KEY -e TEST_SUITES \
            "$IMAGE"

      - name: Stop mock server
        if: always()
        run: |
          [ -f /tmp/mockpid.txt ] && kill "$(cat /tmp/mockpid.txt)" 2>/dev/null || true

  publish:
    needs: [test, reusable-workflow-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push latest tag if still main HEAD
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          git fetch origin main
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            docker buildx imagetools create -t "${image}:latest" "${image}:sha-${{ github.sha }}"
          else
            echo "Skipping latest tag: commit is no longer main HEAD"
          fi
