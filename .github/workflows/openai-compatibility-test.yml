name: OpenAI compatibility test

# Reusable workflow: run the openai-compatibility-tester container against any
# OpenAI-compatible endpoint. Call from another repository:
#
#   jobs:
#     compat:
#       uses: beranekio/openai-compatibility-tester/.github/workflows/openai-compatibility-test.yml@v1
#       with:
#         base_url: https://your-endpoint.example/v1
#         suites: default
#       secrets:
#         api_key: ${{ secrets.YOUR_OPENAI_API_KEY }}
#
# The job fails when any selected suite fails (container exit code 1) or on a
# runner/config error (exit code 2). See docs/suites.md for the suite catalog.
# Input and secret names use snake_case because GitHub secret names cannot
# contain hyphens and `inputs.x-y` is parsed as subtraction.

on:
  workflow_call:
    inputs:
      base_url:
        description: API base URL including /v1 (e.g. https://api.openai.com/v1). No query params.
        required: true
        type: string
      suites:
        description: Comma-separated suite names, or preset (all/default, extended, full).
        required: false
        default: all
        type: string
      model:
        description: Chat completion model. Defaults to the container's default (gpt-4o-mini) when empty.
        required: false
        default: ""
        type: string
      responses_model:
        description: Responses API model. Defaults to OPENAI_MODEL when empty.
        required: false
        default: ""
        type: string
      completion_model:
        description: Legacy completions model. Required when `completions`/`completions_stream` is selected.
        required: false
        default: ""
        type: string
      embedding_model:
        description: Embedding model. Required when `embeddings`/`embeddings_batch` is selected.
        required: false
        default: ""
        type: string
      vision_model:
        description: Vision-capable model. Defaults to OPENAI_MODEL when empty.
        required: false
        default: ""
        type: string
      reasoning_model:
        description: Reasoning model (e.g. o3-mini). Required when `chat_completions_reasoning` is selected.
        required: false
        default: ""
        type: string
      image_model:
        description: Image generation model. Required when `images_generations`/`images_edits` is selected.
        required: false
        default: ""
        type: string
      video_model:
        description: Video generation model (e.g. sora-2). Required when `videos` is selected.
        required: false
        default: ""
        type: string
      tts_model:
        description: Text-to-speech model. Required when `audio_speech` is selected.
        required: false
        default: ""
        type: string
      whisper_model:
        description: Whisper model (e.g. whisper-1). Required when `audio_transcriptions`/`audio_translations` is selected.
        required: false
        default: ""
        type: string
      transcription_model:
        description: Streaming transcription model. Required when `audio_transcriptions_stream` is selected.
        required: false
        default: ""
        type: string
      realtime_model:
        description: Realtime API model. Defaults to gpt-realtime when empty.
        required: false
        default: ""
        type: string
      chatkit_workflow_id:
        description: ChatKit sessions workflow ID. Defaults to wf_mock_compat_test when empty.
        required: false
        default: ""
        type: string
      chatkit_test_thread_id:
        description: Disposable ChatKit thread ID for the `chatkit_threads` delete test. Optional.
        required: false
        default: ""
        type: string
      timeout:
        description: Per-suite request timeout (e.g. 2m, 10m). Defaults to 2m when empty.
        required: false
        default: ""
        type: string
      allow_insecure_http:
        description: Allow plaintext http:// to non-loopback hosts.
        required: false
        default: false
        type: boolean
      image:
        description: Container image to run. Pin to a SHA tag for reproducible CI.
        required: false
        default: ghcr.io/beranekio/openai-compatibility-tester:latest
        type: string
      network:
        description: Docker network to attach the container to (e.g. `host`). Useful when the endpoint is on the runner's localhost.
        required: false
        default: ""
        type: string
    secrets:
      api_key:
        description: Bearer token sent to the endpoint.
        required: true
      org_id:
        description: OpenAI organization ID (sent as OpenAI-Organization). Optional.
        required: false
      project_id:
        description: OpenAI project ID (sent as OpenAI-Project). Optional.
        required: false
      admin_api_key:
        description: Admin API key for the `fine_tuning` checkpoint permissions check. Optional; that check is skipped when unset.
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run compatibility suites
        env:
          OPENAI_BASE_URL: ${{ inputs.base_url }}
          OPENAI_API_KEY: ${{ secrets.api_key }}
          OPENAI_ORG_ID: ${{ secrets.org_id }}
          OPENAI_PROJECT_ID: ${{ secrets.project_id }}
          OPENAI_ADMIN_API_KEY: ${{ secrets.admin_api_key }}
          OPENAI_MODEL: ${{ inputs.model }}
          OPENAI_RESPONSES_MODEL: ${{ inputs.responses_model }}
          OPENAI_COMPLETION_MODEL: ${{ inputs.completion_model }}
          OPENAI_EMBEDDING_MODEL: ${{ inputs.embedding_model }}
          OPENAI_VISION_MODEL: ${{ inputs.vision_model }}
          OPENAI_REASONING_MODEL: ${{ inputs.reasoning_model }}
          OPENAI_IMAGE_MODEL: ${{ inputs.image_model }}
          OPENAI_VIDEO_MODEL: ${{ inputs.video_model }}
          OPENAI_TTS_MODEL: ${{ inputs.tts_model }}
          OPENAI_WHISPER_MODEL: ${{ inputs.whisper_model }}
          OPENAI_TRANSCRIPTION_MODEL: ${{ inputs.transcription_model }}
          OPENAI_REALTIME_MODEL: ${{ inputs.realtime_model }}
          OPENAI_CHATKIT_WORKFLOW_ID: ${{ inputs.chatkit_workflow_id }}
          OPENAI_CHATKIT_TEST_THREAD_ID: ${{ inputs.chatkit_test_thread_id }}
          TEST_SUITES: ${{ inputs.suites }}
          REQUEST_TIMEOUT: ${{ inputs.timeout }}
          ALLOW_INSECURE_HTTP: ${{ inputs.allow_insecure_http }}
          IMAGE: ${{ inputs.image }}
          NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail

          # Pass only variables that are set so unset inputs don't shadow the
          # container's built-in defaults.
          args=(-e OPENAI_BASE_URL -e OPENAI_API_KEY)
          [ -n "$OPENAI_ORG_ID" ]                 && args+=(-e OPENAI_ORG_ID)
          [ -n "$OPENAI_PROJECT_ID" ]             && args+=(-e OPENAI_PROJECT_ID)
          [ -n "$OPENAI_ADMIN_API_KEY" ]          && args+=(-e OPENAI_ADMIN_API_KEY)
          [ -n "$OPENAI_MODEL" ]                  && args+=(-e OPENAI_MODEL)
          [ -n "$OPENAI_RESPONSES_MODEL" ]        && args+=(-e OPENAI_RESPONSES_MODEL)
          [ -n "$OPENAI_COMPLETION_MODEL" ]       && args+=(-e OPENAI_COMPLETION_MODEL)
          [ -n "$OPENAI_EMBEDDING_MODEL" ]        && args+=(-e OPENAI_EMBEDDING_MODEL)
          [ -n "$OPENAI_VISION_MODEL" ]           && args+=(-e OPENAI_VISION_MODEL)
          [ -n "$OPENAI_REASONING_MODEL" ]        && args+=(-e OPENAI_REASONING_MODEL)
          [ -n "$OPENAI_IMAGE_MODEL" ]            && args+=(-e OPENAI_IMAGE_MODEL)
          [ -n "$OPENAI_VIDEO_MODEL" ]            && args+=(-e OPENAI_VIDEO_MODEL)
          [ -n "$OPENAI_TTS_MODEL" ]              && args+=(-e OPENAI_TTS_MODEL)
          [ -n "$OPENAI_WHISPER_MODEL" ]          && args+=(-e OPENAI_WHISPER_MODEL)
          [ -n "$OPENAI_TRANSCRIPTION_MODEL" ]    && args+=(-e OPENAI_TRANSCRIPTION_MODEL)
          [ -n "$OPENAI_REALTIME_MODEL" ]         && args+=(-e OPENAI_REALTIME_MODEL)
          [ -n "$OPENAI_CHATKIT_WORKFLOW_ID" ]    && args+=(-e OPENAI_CHATKIT_WORKFLOW_ID)
          [ -n "$OPENAI_CHATKIT_TEST_THREAD_ID" ] && args+=(-e OPENAI_CHATKIT_TEST_THREAD_ID)
          [ -n "$TEST_SUITES" ]                   && args+=(-e TEST_SUITES)
          [ -n "$REQUEST_TIMEOUT" ]               && args+=(-e REQUEST_TIMEOUT)
          # ALLOW_INSECURE_HTTP is a boolean; pass only when explicitly true.
          if [ "$ALLOW_INSECURE_HTTP" = "true" ]; then
            args+=(-e ALLOW_INSECURE_HTTP=true)
          fi
          run_args=(--rm)
          [ -n "$NETWORK" ] && run_args+=(--network "$NETWORK")

          # The image entrypoint is the tester binary; docker run exits with the
          # binary's exit code (0 = pass, 1 = suite failure, 2 = config error).
          docker run "${run_args[@]}" "${args[@]}" "$IMAGE"
